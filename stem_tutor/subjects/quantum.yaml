subject_id: quantum
display_name: 量子物理
display_name_en: Quantum Physics

error_taxonomy:
  WAVEFUNCTION_NORMALIZATION_ERROR:
    category: "Computational Errors"
    short_desc: "波函数归一化积分计算错误。"
    cues: ["normalization", "归一化", "integral", "probability"]
  OPERATOR_COMMUTATION_ERROR:
    category: "Operator Errors"
    short_desc: "算符之间的对易关系应用错误。"
    cues: ["commutator", "对易", "commute", "uncertainty", "不对易"]
  QUANTUM_NUMBER_VIOLATION:
    category: "Constraint Errors"
    short_desc: "量子数取值超出了允许范围。"
    cues: ["quantum number", "量子数", "principal", "angular momentum", "spin"]
  SCHRODINGER_EQUATION_MISAPPLICATION:
    category: "Equation Application Errors"
    short_desc: "薛定谔方程建立或求解错误。"
    cues: ["Schrodinger", "薛定谔", "Hamiltonian", "本征值", "eigenvalue"]
  PROBABILITY_INTERPRETATION_ERROR:
    category: "Conceptual Confusion"
    short_desc: "玻恩规则或概率诠释应用错误。"
    cues: ["probability", "概率", "Born", "expectation value", "期望值"]
  BOUNDARY_CONDITION_IGNORED:
    category: "Condition Misuse"
    short_desc: "波函数的边界条件未正确应用。"
    cues: ["boundary", "边界", "continuity", "continuous", "势阱", "势垒"]
  SIGN_ARITHMETIC_ERROR:
    category: "Algebraic Manipulation Errors"
    short_desc: "符号或算术化简错误。"
    cues: ["minus", "sign", "simplify"]
  TRANSCRIPTION_ERROR:
    category: "Algebraic Manipulation Errors"
    short_desc: "抄写或转录错误，如抄漏系数/符号/指数。"
    cues: ["transcription", "copy", "omit", "missing digit", "scribal"]
  UNSUPPORTED_JUMP:
    category: "Reasoning Quality Issues"
    short_desc: "步骤缺乏充分的推理依据。"
    cues: ["therefore", "obvious", "skip"]
  DOMAIN_CONDITION_IGNORED:
    category: "Theorem/Condition Misuse"
    short_desc: "忽略了定义域或定理前提条件。"
    cues: ["domain", "condition", "precondition"]
  COEFFICIENT_OMISSION:
    category: "Algebraic Manipulation Errors"
    short_desc: "遗漏了系数或常数因子。"
    cues: ["coefficient", "factor", "missing", "omitted"]
  FINAL_CALCULATION_ERROR:
    category: "Algebraic Manipulation Errors"
    short_desc: "最终数值计算错误。"
    cues: ["arithmetic", "calculation", "numeric"]
  NOTATION_UNCLEAR:
    category: "Reasoning Quality Issues"
    short_desc: "符号表达模糊或不清晰。"
    cues: ["unclear", "ambiguous", "notation", "bra", "ket", "Dirac"]

topic_keywords:
  波函数: ["波函数", "wavefunction", "归一化", "probability density", "概率密度"]
  薛定谔方程: ["薛定谔", "Schrodinger", "定态", "time-independent", "本征态"]
  算符与对易关系: ["算符", "operator", "对易", "commutator", "Hermitian", "厄米"]
  量子数: ["量子数", "quantum number", "主量子数", "角动量", "自旋", "n, l, m"]
  势阱与势垒: ["势阱", "势垒", "potential well", "barrier", "tunneling", "隧穿"]
  谐振子: ["谐振子", "harmonic oscillator", "升降算符", "ladder operator"]
  氢原子: ["氢原子", "hydrogen", "径向", "角向", "球谐函数", "spherical harmonics"]
  不确定性原理: ["不确定性", "uncertainty", "Heisenberg", "测不准"]

prompts:
  system_role: "你是一个精确的{subject_name}辅导 JSON API。所有输出请使用中文（简体中文）。物理公式请用 $...$ 包裹行内公式，用 $$...$$ 包裹独立公式。量子态用 Dirac 记号表示。"
  verification_role: "你是一位{subject_name}阅卷老师。请判断学生的解题步骤是否正确。返回 JSON 格式。"
  verification_extra: |
    1. 请结合上下文判断：如果当前步骤是中间过渡形式，且下一步完成了该步骤的推导，则当前步骤应判为正确
    2. 特别注意波函数的归一化条件和边界条件
    3. 检查算符的对易关系和量子数的取值范围
    4. 只有当步骤本身存在物理错误，或完全无法理解时，才判为 incorrect_math 或 unclear
    5. 请用中文输出 evidence 字段，说明判断依据
  final_answer_role: "你是一位{subject_name}阅卷老师。请判断学生的最终答案是否正确。"
  final_answer_extra: "请先自己求解，然后与学生答案对比。注意检查波函数是否归一化、量子数是否合法。请用中文输出 explanation 字段。"
  diagnosis_extra: "请诊断学生错误的根本原因，使用一个错误类型代码。请用中文输出 root_cause_hypothesis 和 supporting_evidence 字段。"
  feedback_extra: "请为学生撰写简洁的学习反馈。请用中文输出所有字段。"
  review_problem_extra: |
    请生成 1-3 道类似的复习练习题，并说明出题的理由。
    请用中文输出 problem_text 和 rationale 字段。
  review_problem_all_correct_extra: |
    该学生在本道题中表现优秀，所有步骤均正确。
    请生成 1-3 道与原题主题相关的进阶练习题，难度由易到难。
    difficulty_label 请分别使用 easy、medium、hard。
    请用中文输出 problem_text 和 rationale 字段。

sympy_postprocess:
  strip_prefixes: ["解：", "解:", "therefore", "Thus", "So", "令", "设", "即", "得", "故", "所以", "因为", "where", "given"]
  derivative_patterns: []

rule_adjustments:
  - conditions:
      - type: contains
        value: "therefore"
      - type: not_contains
        value: "="
    label: "inconsistent_or_unsupported"
    evidence: "Step uses an inference marker without a concrete equivalence."
    violated_principles: ["insufficient_justification"]
  - conditions:
      - type: contains
        value: "normalize"
      - type: not_contains
        value: "integral"
    label: "unclear"
    evidence: "Normalization stated without showing the integral computation."
    violated_principles: ["clarity"]

mock:
  reference_solution:
    reference_text: "由于分析资源限制，未能生成完整的参考解答。建议更换更快的模型（如 Mistral Small 3.2）或提高参考解答预算后重试。"
    key_assertions: []
  review_problems:
    - problem_text: "一维无限深势阱宽度为 a，求基态波函数和能量本征值。"
      related_weakness_code: "SCHRODINGER_EQUATION_MISAPPLICATION"
      rationale: "Reinforces solving Schrodinger equation with boundary conditions."
      difficulty_label: "easy"
    - problem_text: "验证位置算符 x 和动量算符 p 的对易关系 [x,p] = i*hbar。"
      related_weakness_code: "OPERATOR_COMMUTATION_ERROR"
      rationale: "Targets fundamental commutation relation computation."
      difficulty_label: "medium"
